<!DOCTYPE html>
<html>
<head>
    <title>Activate License</title>

    <style>
        body {
            background: #1e2f44;
            color: white;
            text-align: center;
            padding-top: 100px;
        }

        input {
            padding: 10px;
            width: 250px;
        }

        button {
            padding: 10px 20px;
            background: #00c6ff;
            border: none;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<h2>🔑 Enter License Key</h2>

<input type="text" id="key" placeholder="Enter License Key" />
<br><br>

<button onclick="activate()">Activate</button>

<p id="msg"></p>

<script>
function activate() {

    let key = document.getElementById("key").value;

    fetch("/api/license/activate", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            licenseKey: key
        })
    })
    .then(res => res.text())   // 🔥 CHANGE HERE
    .then(data => {

        document.getElementById("msg").innerText = data;

        if (data.includes("Activated") || data.includes("Valid")) {
            setTimeout(() => {
                window.location.href = "login.html";
            }, 1500);
        }
    })
    .catch(err => {
        document.getElementById("msg").innerText = "❌ Server Error";
    });
}
</script>

</body>
</html>
