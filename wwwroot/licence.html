<!DOCTYPE html>
<html>
<head>
    <title>Activate License</title>

    <style>
        body {
            background: #1e2f44;
            color: white;
            text-align: center;
            padding-top: 100px;
            font-family: Arial;
        }

        input {
            padding: 12px;
            width: 260px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 12px 25px;
            margin-top: 20px;
            background: #00c6ff;
            border: none;
            cursor: pointer;
            color: black;
            font-weight: bold;
            border-radius: 5px;
        }

        button:hover {
            background: #00a8dd;
        }
    </style>
</head>

<body>

<h2>🔑 Enter License</h2>

<input type="text" id="license" placeholder="Enter License Key" />
<br><br>

<button onclick="activate()">Activate</button>

<script>

// 🔥 AUTO CHECK (PAGE LOAD)
window.onload = function () {

    let machineId = localStorage.getItem("machineId");

    if (!machineId) {
        machineId = "WEB-" + Math.random().toString(36).substring(2, 10);
        localStorage.setItem("machineId", machineId);
    }

    console.log("Machine ID:", machineId);

    // 🔥 CHECK ALREADY ACTIVATED
    fetch("https://userpluginapi-3-3ptz.onrender.com/api/license/check?machineId=" + machineId)
    .then(res => res.json())
    .then(data => {

        if (data.status === "VALID") {
            // ✅ Already activated → skip page
            window.location.href = "/swagger/index.html";
        }

    });
};


// 🔥 ACTIVATE FUNCTION
function activate() {

    let key = document.getElementById("license").value;

    if (!key) {
        alert("⚠ Please enter license key");
        return;
    }

    let machineId = localStorage.getItem("machineId");

    fetch("https://userpluginapi-3-3ptz.onrender.com/api/license/activate", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            licenseKey: key,
            machineId: machineId
        })
    })
    .then(res => res.json())
    .then(data => {

        alert(data.message);

        if (data.message.includes("Activated") || data.message.includes("Valid")) {
            window.location.href = "/swagger/index.html";
        }

    })
    .catch(err => {
        console.error(err);
        alert("❌ Server error");
    });
}

</script>

</body>
</html>
