<!DOCTYPE html>
<html>
<head>
    <title>Activate License</title>

    <style>
        body {
            background: #1e2f44;
            color: white;
            text-align: center;
            padding-top: 100px;
            font-family: Arial;
        }

        input {
            padding: 12px;
            width: 260px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 12px 25px;
            margin-top: 20px;
            background: #00c6ff;
            border: none;
            cursor: pointer;
            color: black;
            font-weight: bold;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<h2>🔑 Enter License</h2>

<input type="text" id="license" placeholder="Enter License Key" />
<br>

<button onclick="activate()">Activate</button>

<script>
function activate() {

    let key = document.getElementById("license").value;

    if (!key) {
        alert("⚠ Enter license key");
        return;
    }

    // 🔥 MACHINE ID CREATE
    const machineId = navigator.userAgent + navigator.platform;

    console.log("Machine ID:", machineId);

    fetch("/api/license/activate", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            licenseKey: key,
            machineId: machineId
        })
    })
    .then(res => res.json())
    .then(data => {

        alert(data.message);

        if (data.message.includes("Activated") || data.message.includes("Valid")) {
            window.location.href = "/swagger/index.html";
        }

    })
    .catch(err => {
        console.error(err);
        alert("Server Error");
    });
}
</script>

</body>
</html>
