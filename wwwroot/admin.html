<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>

    <style>
        body {
            background: #1e2f44;
            color: white;
            text-align: center;
            font-family: Arial;
            padding-top: 100px;
        }

        button {
            padding: 10px 20px;
            background: #00c6ff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
        }

        #result {
            margin-top: 20px;
            font-size: 18px;
            color: #00ffcc;
        }
    </style>
</head>
<body>

<h2>🔐 Admin License Panel</h2>

<button onclick="generate()">Generate License</button>
<button onclick="logout()">Logout</button>

<p id="result"></p>

<script>

// 🔥 PAGE LOAD → CHECK TOKEN
window.onload = function () {
    let token = localStorage.getItem("token");

    if (!token) {
        alert("❌ Please login first");
        window.location.href = "login.html";
    }
};

// 🔥 GENERATE LICENSE
function generate() {

    let token = localStorage.getItem("token");

    fetch("/api/admin/generate", {
        method: "POST",
        headers: {
            "Authorization": "Bearer " + token,
            "Content-Type": "application/json"
        }
    })
    .then(res => {
        if (!res.ok) {
            throw new Error("Unauthorized / API Error");
        }
        return res.json();
    })
    .then(data => {

        console.log("API RESPONSE:", data);

        document.getElementById("result").innerText =
            "✅ License: " + data.license + " | Expiry: " + data.expiry;

    })
    .catch(err => {
        console.error(err);
        alert("❌ Token expired / Unauthorized");
    });
}

// 🔥 LOGOUT FUNCTION
function logout() {
    localStorage.removeItem("token");
    alert("👋 Logged out successfully");
   window.location.href = "/swagger/index.html";
}

</script>

</body>
</html>
