<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

<h2>Login</h2>

<input type="text" id="username" placeholder="Username" />
<br><br>

<input type="password" id="password" placeholder="Password" />
<br><br>

<button onclick="login()">Login</button>

<script>
function login() {

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    // 🔥 SAME MACHINE ID (FROM LICENSE PAGE)
    let machineId = localStorage.getItem("machineId");

    if (!machineId) {
        alert("❌ Please activate license first");
        return;
    }

    console.log("Machine ID:", machineId);

    fetch("https://userpluginapi-3-3ptz.onrender.com/api/login/login", {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'MachineId': machineId   // 🔥 VERY IMPORTANT
        },
        body: JSON.stringify({
            username: username,
            password: password
        })
    })
    .then(res => res.json())
    .then(data => {

        console.log("LOGIN RESPONSE:", data);

        if (data.token) {

            localStorage.setItem("token", data.token);

            alert("✅ Login Success");

            setTimeout(() => {
                window.location.href = "/admin.html";
            }, 500);

        } else {
            alert(data.message);
        }
    })
    .catch(err => {
        console.error(err);
        alert("❌ Login Error");
    });
}
</script>

</body>
</html>
